id: rs.ilijaruzic.loopa
runtime: org.freedesktop.Platform
runtime-version: '25.08'
sdk: org.freedesktop.Sdk
command: loopa

finish-args:
  - --share=ipc
  - --socket=fallback-x11
  - --socket=wayland
  - --device=dri
  - --share=network
  - --filesystem=xdg-documents
  - --filesystem=xdg-pictures
  - --talk-name=org.freedesktop.Notifications

modules:
  - name: loopa
    buildsystem: simple
    build-commands:
      - install -d /app/loopa/lib /app/loopa/data
      - install -Dm755 loopa /app/loopa/loopa
      - cp -r lib/. /app/loopa/lib/
      - cp -r data/. /app/loopa/data/
      - install -Dm755 loopa-wrapper.sh /app/bin/loopa
      - install -Dm644 rs.ilijaruzic.loopa.desktop
          /app/share/applications/rs.ilijaruzic.loopa.desktop
      - install -Dm644 rs.ilijaruzic.loopa.png
          /app/share/icons/hicolor/512x512/apps/rs.ilijaruzic.loopa.png
      - install -Dm644 rs.ilijaruzic.loopa.metainfo.xml
          /app/share/metainfo/rs.ilijaruzic.loopa.metainfo.xml

    sources:
      - type: archive
        url: https://github.com/ilijaruzic/loopa-publish/releases/download/v1.4.11/loopa-flatpack-x86_64.tar.gz
        sha256: 2394ce661be0e1ad0e9ae36fc5bbd223de16d85a48190c75f28269b9ea444a5c
        strip-components: 0
        only-arches:
          - x86_64

      - type: archive
        url: https://github.com/ilijaruzic/loopa-publish/releases/download/v1.4.11/loopa-flatpack-aarch64.tar.gz
        sha256: 28198e450b820ea36f77a5f1d7148e22fa35cf6302d19d1cde51faea92ae8676
        strip-components: 0
        only-arches:
          - aarch64

id: rs.ilijaruzic.loopa
runtime: org.freedesktop.Platform
runtime-version: '25.08'
sdk: org.freedesktop.Sdk
command: loopa

finish-args:
  - --share=ipc
  - --socket=fallback-x11
  - --socket=wayland
  - --device=dri
  - --share=network
  - --filesystem=xdg-documents
  - --filesystem=xdg-download
  - --talk-name=org.freedesktop.Notifications

modules:
  - name: loopa
    buildsystem: simple
    build-commands:
      - install -d /app/loopa/lib /app/loopa/data
      - install -Dm755 loopa /app/loopa/loopa
      - cp -r lib/. /app/loopa/lib/
      - cp -r data/. /app/loopa/data/
      - install -Dm755 loopa-wrapper.sh /app/bin/loopa
      - install -Dm644 rs.ilijaruzic.loopa.desktop
          /app/share/applications/rs.ilijaruzic.loopa.desktop
      - install -Dm644 rs.ilijaruzic.loopa.png
          /app/share/icons/hicolor/512x512/apps/rs.ilijaruzic.loopa.png
      - install -Dm644 rs.ilijaruzic.loopa.metainfo.xml
          /app/share/metainfo/rs.ilijaruzic.loopa.metainfo.xml

    sources:
      - type: archive
        url: https://github.com/ilijaruzic/loopa-publish/releases/download/v1.4.8/loopa-flatpack.tar.gz
        sha256: a509ec2dafb9319ff03d42adcf0df647a92785ee8f72b88ca61b134e6f4a4f6c
        strip-components: 0

      - type: inline
        dest-filename: loopa-wrapper.sh
        contents: |
          #!/bin/bash
          exec /app/loopa/loopa "$@"

      - type: inline
        dest-filename: rs.ilijaruzic.loopa.desktop
        contents: |
          [Desktop Entry]
          Type=Application
          Name=Loopa
          Comment=Phase space simulator for complex dynamical systems
          Exec=loopa %u
          Icon=rs.ilijaruzic.loopa
          Categories=Science;Education;
          Terminal=false
          StartupWMClass=loopa
          MimeType=x-scheme-handler/loopa;

      - type: file
        url: https://raw.githubusercontent.com/ilijaruzic/loopa-publish/main/res/app_icon_512.png
        sha256: 1ec15872b80e1948989d9823cfae2ba5bb0e61f37adaa59da58d7fefd82a1767
        dest-filename: rs.ilijaruzic.loopa.png

      - type: file
        path: rs.ilijaruzic.loopa.metainfo.xml

id: rs.ilijaruzic.loopa
runtime: org.freedesktop.Platform
runtime-version: '25.08'
sdk: org.freedesktop.Sdk
command: loopa

finish-args:
  - --share=ipc
  - --socket=fallback-x11
  - --socket=wayland
  - --device=dri
  - --share=network
  - --filesystem=xdg-documents
  - --filesystem=xdg-pictures
  - --talk-name=org.freedesktop.Notifications

modules:
  - name: loopa
    buildsystem: simple
    build-commands:
      - install -d /app/loopa/lib /app/loopa/data
      - install -Dm755 loopa /app/loopa/loopa
      - cp -r lib/. /app/loopa/lib/
      - cp -r data/. /app/loopa/data/
      - install -Dm755 loopa-wrapper.sh /app/bin/loopa
      - install -Dm644 rs.ilijaruzic.loopa.desktop
          /app/share/applications/rs.ilijaruzic.loopa.desktop
      - install -Dm644 rs.ilijaruzic.loopa.png
          /app/share/icons/hicolor/512x512/apps/rs.ilijaruzic.loopa.png
      - install -Dm644 rs.ilijaruzic.loopa.metainfo.xml
          /app/share/metainfo/rs.ilijaruzic.loopa.metainfo.xml

    sources:
      - type: archive
        url: https://github.com/ilijaruzic/loopa-publish/releases/download/v1.4.8/loopa-flatpack.tar.gz
        sha256: 83cb4464ae7622d90f321cdc44693cdf8e3ef66382a3aa91a7862afbc82397c6
        strip-components: 0


id: rs.ilijaruzic.loopa
runtime: org.freedesktop.Platform
runtime-version: '25.08'
sdk: org.freedesktop.Sdk
command: loopa

finish-args:
  - --share=ipc
  - --socket=fallback-x11
  - --socket=wayland
  - --device=dri
  # Used to load the privacy policy and terms of service displayed in the About page
  - --share=network
  # Used to save graph data as CSV files when the user chooses to export from the app
  - --filesystem=xdg-documents
  # Used to save graph images as PNG files when the user chooses to export from the app
  - --filesystem=xdg-pictures
  # Used to send a desktop notification letting the user know whether an export succeeded or failed
  - --talk-name=org.freedesktop.Notifications

modules:
  - name: loopa
    buildsystem: cmake

    sources:
      - type: archive
        url: https://github.com/ilijaruzic/loopa-publish/releases/download/v1.4.15/loopa-flatpak-x86_64.tar.gz
        sha256: 5c87242dba1f6a96a038fca07d0dbe149620e3c2f37b20fe5fb3b78365abab17
        strip-components: 0
        only-arches:
          - x86_64

      - type: archive
        url: https://github.com/ilijaruzic/loopa-publish/releases/download/v1.4.15/loopa-flatpak-aarch64.tar.gz
        sha256: 9211d81f0f8c6f32c485851fa7cc99aabcc6ef0b9b7b5436d9bc175083569d15
        strip-components: 0
        only-arches:
          - aarch64

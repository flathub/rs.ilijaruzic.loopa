id: rs.ilijaruzic.loopa
runtime: org.freedesktop.Platform
runtime-version: '25.08'
sdk: org.freedesktop.Sdk
command: loopa

finish-args:
  - --share=ipc
  - --socket=fallback-x11
  - --socket=wayland
  - --device=dri
  # Used to save graph data as CSV files when the user chooses to export from the app
  - --filesystem=xdg-documents
  # Used to save graph images as PNG files when the user chooses to export from the app
  - --filesystem=xdg-pictures
  # Used to send a desktop notification letting the user know whether an export succeeded or failed
  - --talk-name=org.freedesktop.Notifications

modules:
  - name: loopa
    buildsystem: cmake

    sources:
      - type: archive
        url: https://github.com/ilijaruzic/loopa-publish/releases/download/v1.4.16/loopa-flatpak-x86_64.tar.gz
        sha256: 82d42be57bfd52dbc7f68b7e55a1f4d40c9505cf7d0c89649e08f49daf42bfbd
        strip-components: 0
        only-arches:
          - x86_64

      - type: archive
        url: https://github.com/ilijaruzic/loopa-publish/releases/download/v1.4.16/loopa-flatpak-aarch64.tar.gz
        sha256: edbabefff0adf95613f99a9cd930a36afe31669cce31846e38c18b9b343f60ff
        strip-components: 0
        only-arches:
          - aarch64
